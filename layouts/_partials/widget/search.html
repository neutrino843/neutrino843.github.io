{{- $query := first 1 (where .Context.Site.Pages "Layout" "==" "search") -}}
{{- if $query -}}
    {{- $searchPage := index $query 0 -}}
    <form action="{{ $searchPage.RelPermalink }}" class="search-form widget" {{ with .OutputFormats.Get "json" -}}data-json="{{ .RelPermalink }}" {{- end }}>
        <p>
            <label data-i18n-key="search.title">{{ T "search.title" }}</label>
            <input name="keyword" required placeholder="{{ T `search.placeholder` }}" data-i18n-key="search.placeholder" data-i18n-target="placeholder" />
        
            <button title="{{ T `search.title` }}" data-i18n-key="search.title" data-i18n-target="title">
                {{ partial "helper/icon" "search" }}
            </button>
        </p>
    </form>
{{- else -}}
    {{- warnf "Search page not found. Create a page with layout: search." -}}
{{- end -}}
