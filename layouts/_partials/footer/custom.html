{{- if $bgImg -}}
<style>
  body {
    background: url({{ $bgImg.Permalink }}) no-repeat center 17%;
    background-size: cover;
    background-attachment: fixed;
  }
</style>
{{- end -}}

<div id="particles-js"></div>

<style>

<script>
function refreshVercount() {
    var url = encodeURIComponent(window.location.href);
    fetch('https://cn.vercount.one/api?url=' + url)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var pagePv = document.getElementById('vercount_value_page_pv');
            if (pagePv && data.page_pv) pagePv.textContent = data.page_pv;
            var sitePv = document.getElementById('vercount_value_site_pv');
            if (sitePv && data.site_pv) sitePv.textContent = data.site_pv;
            var siteUv = document.getElementById('vercount_value_site_uv');
            if (siteUv && data.site_uv) siteUv.textContent = data.site_uv;
        }).catch(function(e) { console.log('vercount refresh:', e); });
}

function showHideView() {
    var viewCounts = document.querySelectorAll(".viewCount");
    if (viewCounts.length > 0) {
        var article = document.querySelector(".article-page");
        if (!article) {
            viewCounts.forEach(function(ele) { ele.style.display = 'none'; });
        }
    }
}

document.addEventListener('DOMContentLoaded', function() {
    showHideView();
    refreshVercount();
    setTimeout(refreshVercount, 2000);
});
</script>
