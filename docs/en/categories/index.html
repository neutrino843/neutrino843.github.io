<script>
var pjax = new Pjax({
    selectors: [
        ".main-container",
        ".js-Pjax"
    ]
});

pjax._handleResponse = pjax.handleResponse;
pjax.handleResponse = function(responseText, request, href, options) {
    if (request.responseText.match("<html")) {
        if (responseText) {
            var newDom = new DOMParser().parseFromString(responseText, 'text/html');
            var bodyClass = newDom.body.className;
            document.body.setAttribute("class", bodyClass);
        }
        pjax._handleResponse(responseText, request, href, options);
    }
};

function getAPlayer() {
    var meting = document.querySelector('meting-js');
    return meting && meting.aplayer ? meting.aplayer : null;
}

window.onbeforeunload = function() {
    var ap = getAPlayer();
    if (ap && ap.audio && ap.list) {
        var playInfo = {
            index: ap.list.index,
            currentTime: ap.audio.currentTime,
            paused: ap.paused
        };
        localStorage.setItem("playInfo", JSON.stringify(playInfo));
    }
};

window.onload = function() {
    var counter = 0;
    var checkInterval = setInterval(function() {
        counter++;
        var ap = getAPlayer();
        if (ap && ap.list && ap.list.audios && ap.list.audios.length > 0) {
            clearInterval(checkInterval);
            var playInfoStr = localStorage.getItem("playInfo");
            if (!playInfoStr) return;
            var playInfo = JSON.parse(playInfoStr);
            if (!playInfo) return;
            try {
                ap.list.switch(playInfo.index);
                setTimeout(function() {
                    ap.seek(playInfo.currentTime);
                    if (!playInfo.paused) {
                        ap.play();
                    }
                }, 500);
            } catch(e) {}
        }
        if (counter > 50) clearInterval(checkInterval);
    }, 200);
};

function refreshVercount() {
    var url = encodeURIComponent(window.location.href);
    fetch('https://cn.vercount.one/api?url=' + url)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var pagePv = document.getElementById('vercount_value_page_pv');
            if (pagePv && data.page_pv) pagePv.textContent = data.page_pv;
            var sitePv = document.getElementById('vercount_value_site_pv');
            if (sitePv && data.site_pv) sitePv.textContent = data.site_pv;
            var siteUv = document.getElementById('vercount_value_site_uv');
            if (siteUv && data.site_uv) siteUv.textContent = data.site_uv;
        }).catch(function(e) { console.log('vercount refresh:', e); });
}

function showHideView() {
    var viewCounts = document.querySelectorAll(".viewCount");
    if (viewCounts.length > 0) {
        var article = document.querySelector(".article-page");
        if (!article) {
            viewCounts.forEach(function(ele) { ele.style.display = 'none'; });
        }
    }
}

document.addEventListener('DOMContentLoaded', function() {
    showHideView();
    refreshVercount();
    setTimeout(refreshVercount, 2000);
});

document.addEventListener('pjax:complete', function() {
    if (window.Stack && window.Stack.init) window.Stack.init();
    if (window.switchLanguage) {
        var lang = localStorage.getItem('preferred-language') || 'zh-cn';
        window.switchLanguage(lang);
    }
    showHideView();
    setTimeout(refreshVercount, 100);
    setTimeout(refreshVercount, 2000);
});
</script>
