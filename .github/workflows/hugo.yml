name: Auto Build Hugo & Deploy Docs

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.1'
          extended: true

      - name: Build
        run: hugo --configDir config --themesDir themes --minify --baseURL "https://neutrino843.github.io/" --destination docs

      - name: Deploy (commit docs)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ -f
          git diff --cached --quiet || git commit -m "Auto-build: deploy Hugo to docs [skip ci]"
          git push
